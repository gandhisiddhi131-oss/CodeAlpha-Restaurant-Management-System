<!DOCTYPE html>
<html>
<head>
<title>Restaurant System</title>

<style>

body{
font-family:'Segoe UI';
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.container{
background:white;
padding:30px;
border-radius:15px;
width:400px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px;
width:100%;
border:none;
border-radius:8px;
margin-top:10px;
font-size:16px;
cursor:pointer;
}

button:nth-of-type(1){
background:#ff5722;
color:white;
}

button:nth-of-type(2){
background:#4CAF50;
color:white;
}

#cart{
margin-top:15px;
text-align:left;
}

#billContainer{
margin-top:20px;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
width:400px;
}
.bill-box{
background:white;
padding:25px;
border-radius:15px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
margin-top:20px;
text-align:center;
}

.bill-table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

.bill-table th{
background:#ff5722;
color:white;
padding:10px;
}

.bill-table td{
padding:10px;
border-bottom:1px solid #ddd;
}

.bill-summary{
margin-top:15px;
text-align:right;
}

.bill-summary p{
margin:5px 0;
}

.thankyou{
margin-top:15px;
color:green;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>🍽️ Restaurant Order</h2>

<input type="text" id="name" placeholder="Enter Your Name">

<select id="menu"></select>

<input type="number" id="quantity" value="1" min="1">

<button onclick="addToCart()">Add to Cart</button>
<button onclick="generateBill()">Generate Bill</button>

<div id="cart"></div>

</div>

<div id="billContainer" style="display:none;">

<div class="bill-box">

<h2>🍽️ Restaurant Bill</h2>

<p id="customerName"></p>
<p id="billDate"></p>

<table class="bill-table">
<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Price</th>
</tr>
</thead>

<tbody id="billItems"></tbody>

</table>

<div class="bill-summary">
<p id="subtotal"></p>
<p id="gst"></p>
<h3 id="finalTotal"></h3>
</div>

<p class="thankyou">✨ Thank You! Visit Again ✨</p>

</div>

</div>

<script>

let cart = []

async function loadMenu(){

const res = await fetch("/menu")
const data = await res.json()

const dropdown = document.getElementById("menu")

data.forEach(item=>{
const option=document.createElement("option")
option.value=item.id
option.text=item.item_name + " - ₹" + item.price
dropdown.appendChild(option)
})

}

function addToCart(){

const name=document.getElementById("name").value
const menu=document.getElementById("menu")
const quantity=document.getElementById("quantity").value

if(!name){
alert("Enter name")
return
}

const itemName = menu.options[menu.selectedIndex].text
const itemId = menu.value
const price = parseInt(itemName.split("₹")[1])

cart.push({
item_id:itemId,
item_name:itemName,
price:price,
quantity:parseInt(quantity)
})

displayCart()

}

function displayCart(){

const cartDiv=document.getElementById("cart")
cartDiv.innerHTML="<h3>🛒 Your Cart:</h3>"

cart.forEach(item=>{
cartDiv.innerHTML += `<p>${item.item_name} × ${item.quantity}</p>`
})

}

async function generateBill(){

const name=document.getElementById("name").value

if(cart.length===0){
alert("Cart is empty")
return
}

// Save orders
for(let item of cart){

await fetch("/order",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
customer_name:name,
item_id:item.item_id,
quantity:item.quantity
})
})

}

// Show bill
const billItems=document.getElementById("billItems")
billItems.innerHTML=""

let subtotal=0

cart.forEach(item=>{

const itemTotal=item.price * item.quantity
subtotal+=itemTotal

billItems.innerHTML += `
<tr>
<td>${item.item_name.split(" -")[0]}</td>
<td>${item.quantity}</td>
<td>₹${itemTotal}</td>
</tr>
`

})

// GST Calculation (18%)
const gstAmount = subtotal * 0.18
const finalTotal = subtotal + gstAmount

// Set values
document.getElementById("customerName").innerText="Customer: "+name

const today = new Date()
document.getElementById("billDate").innerText =
"Date: " + today.toLocaleDateString()

document.getElementById("subtotal").innerText="Subtotal: ₹"+subtotal
document.getElementById("gst").innerText="GST (18%): ₹"+gstAmount.toFixed(2)
document.getElementById("finalTotal").innerText="Total: ₹"+finalTotal.toFixed(2)

// Show bill
document.getElementById("billContainer").style.display="block"

// Clear cart
cart=[]
document.getElementById("cart").innerHTML=""

}

loadMenu()

</script>

</body>
</html>
